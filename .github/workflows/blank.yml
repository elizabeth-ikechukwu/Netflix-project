name: Demo CI Pipeline

on:
  push:
    branches:
      - main
      - feat-*
  pull_request:
    branches:
      - main

jobs:
  check-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Confirm project file exists
        run: test -f README.md
